<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Steva Electrical</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b1220;--card:#111a2e;--accent:#38bdf8;--text:#e6edf7;}
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,system-ui}
body{background:radial-gradient(1200px 600px at 80% -10%,rgba(56,189,248,.15),transparent),var(--bg);color:var(--text);overflow-x:hidden}
header{position:fixed;inset:0 0 auto 0;height:70px;display:flex;align-items:center;justify-content:space-between;padding:0 8%;backdrop-filter:blur(10px);background:rgba(11,18,32,.6);border-bottom:1px solid rgba(255,255,255,.05);z-index:10}
.logo{font-weight:800;letter-spacing:.5px}
nav a{margin-left:24px;color:#cfe3ff;text-decoration:none;opacity:.8}
nav a:hover{opacity:1;color:var(--accent)}
.hero{min-height:100vh;display:grid;place-items:center;text-align:center;padding-top:90px}
.hero h1{font-size:clamp(34px,6vw,64px);line-height:1.1}
.hero h1 span{color:var(--accent);text-shadow:0 0 30px rgba(56,189,248,.5)}
.hero p{opacity:.8;margin-top:10px}
.btn{display:inline-block;margin-top:22px;padding:14px 28px;border-radius:999px;background:linear-gradient(135deg,#38bdf8,#22d3ee);color:#001018;text-decoration:none;font-weight:700;box-shadow:0 10px 30px rgba(56,189,248,.35)}
.section{padding:90px 8%}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:22px}
.card{background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.02));border:1px solid rgba(255,255,255,.06);padding:22px;border-radius:22px;position:relative;overflow:hidden}
.card::after{content:"";position:absolute;inset:auto -40% -60% -40%;height:120%;background:radial-gradient(closest-side,rgba(56,189,248,.25),transparent);opacity:.0;transition:.4s}
.card:hover::after{opacity:1}
.card:hover{transform:translateY(-8px)}
.card h3{color:var(--accent);margin-bottom:6px}
.gallery{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px}
.gallery div{height:180px;border-radius:16px;background:linear-gradient(120deg,#0f1b33,#15264a);position:relative;overflow:hidden}
.gallery div::before{content:"";position:absolute;inset:-50%;background:conic-gradient(from 0deg,transparent,rgba(56,189,248,.6),transparent 30%);animation:spin 6s linear infinite}
.gallery div::after{content:"Project";position:absolute;inset:2px;border-radius:14px;background:#0b1220;display:grid;place-items:center;color:#9cc7ff}
@keyframes spin{to{transform:rotate(360deg)}}
.contact{display:grid;grid-template-columns:1fr 1fr;gap:20px}
input,textarea{width:100%;padding:14px;border-radius:12px;border:1px solid rgba(255,255,255,.08);background:#0b1220;color:#e6edf7}
footer{padding:30px 8%;text-align:center;opacity:.7}
canvas#fx{position:fixed;inset:0;z-index:-1}
@media(max-width:800px){.contact{grid-template-columns:1fr}}
</style>
</head>
<body>
<canvas id="fx"></canvas>
<header>
<div class="logo">Steva Electrical</div>
<nav>
<a href="#services">Services</a>
<a href="#work">Work</a>
<a href="#contact">Contact</a>
</nav>
</header>

<section class="hero">
<div>
<h1>Reliable <span>Electrical Power</span></h1>
<p>Residential • Commercial • Smart Lighting</p>
<a class="btn" href="#contact">Get a Quote</a>
</div>
</section>

<section id="services" class="section">
<h2>Services</h2>
<div class="grid">
<div class="card"><h3>House Wiring</h3><p>Modern, safe installations.</p></div>
<div class="card"><h3>Lighting Design</h3><p>Elegant indoor/outdoor setups.</p></div>
<div class="card"><h3>Repairs</h3><p>Fast fault diagnosis.</p></div>
</div>
</section>

<section id="work" class="section">
<h2>Recent Work</h2>
<div class="gallery">
<div></div><div></div><div></div><div></div>
</html>
